<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Review Authenticity Checker</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: #f0f4f8;
  display: flex;
  justify-content: center;
  width: 340px;
  padding: 10px;
}

.container {
  width: 100%;
  background: #ffffff;
  border-radius: 16px;
  overflow: hidden;
  border: 1px solid #d1dce8;
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.10);
}

/* ── Header ── */
.header {
  background: #1a56a8;
  padding: 13px 15px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.header-icon {
  width: 32px;
  height: 32px;
  background: rgba(255,255,255,0.18);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.header-icon svg {
  width: 16px;
  height: 16px;
}
.header-title {
  color: #ffffff;
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 0.1px;
}
.header-sub {
  color: rgba(255,255,255,0.65);
  font-size: 11px;
  margin-top: 1px;
}
.version-badge {
  margin-left: auto;
  background: rgba(255,255,255,0.15);
  color: rgba(255,255,255,0.85);
  font-size: 10px;
  padding: 3px 8px;
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.2);
  flex-shrink: 0;
}

/* ── Body ── */
.body {
  padding: 14px 15px;
}

.field-label {
  font-size: 11px;
  font-weight: 600;
  color: #6b7c93;
  letter-spacing: 0.5px;
  margin-bottom: 6px;
}

textarea {
  width: 100%;
  height: 88px;
  padding: 9px 11px;
  border-radius: 8px;
  border: 1px solid #c8d6e5;
  background: #f7fafc;
  color: #1a2b3c;
  resize: none;
  outline: none;
  font-size: 13px;
  line-height: 1.5;
  transition: border-color 0.2s, box-shadow 0.2s;
}
textarea::placeholder { color: #a0b0c0; }
textarea:focus {
  border-color: #1a56a8;
  background: #fff;
  box-shadow: 0 0 0 3px rgba(26, 86, 168, 0.12);
}

button {
  width: 100%;
  margin-top: 10px;
  padding: 11px;
  border-radius: 8px;
  background: #1a56a8;
  color: #ffffff;
  border: none;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  letter-spacing: 0.2px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
  transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
}
button:hover {
  background: #154e9a;
  box-shadow: 0 4px 14px rgba(26, 86, 168, 0.35);
  transform: translateY(-1px);
}
button:active { transform: scale(0.98); }
button:disabled { opacity: 0.55; cursor: not-allowed; transform: none; box-shadow: none; }
button svg { width: 14px; height: 14px; flex-shrink: 0; }

/* ── Result card ── */
#result {
  margin-top: 12px;
  background: #f7fafc;
  border: 1px solid #d1dce8;
  border-radius: 10px;
  padding: 12px;
}

/* ── Score row ── */
.score-row {
  display: flex;
  gap: 8px;
  margin-bottom: 11px;
}
.score-box {
  flex: 1;
  padding: 9px 10px;
  border-radius: 8px;
  text-align: center;
  border: 1px solid;
}
.fake {
  background: #fff5f5;
  border-color: #fccaca;
}
.trust {
  background: #f0fdf4;
  border-color: #bbf7d0;
}
.score-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.5px;
  margin-bottom: 4px;
}
.fake .score-label  { color: #c53030; }
.trust .score-label { color: #276749; }
.score-value {
  font-size: 22px;
  font-weight: 700;
}
.fake .score-value  { color: #e53e3e; }
.trust .score-value { color: #38a169; }
.score-bar {
  height: 4px;
  background: rgba(0,0,0,0.08);
  border-radius: 4px;
  margin-top: 6px;
  overflow: hidden;
}
.score-fill {
  height: 100%;
  border-radius: 4px;
  transition: width 0.5s ease;
}
.fake  .score-fill { background: #e53e3e; }
.trust .score-fill { background: #38a169; }

/* ── Divider ── */
.divider {
  border: none;
  border-top: 1px solid #d1dce8;
  margin: 0 0 10px;
}

/* ── Explanation ── */
#explanation {
  font-size: 12px;
  color: #4a5568;
  line-height: 1.65;
}

/* ── Footer ── */
.footer {
  padding: 8px 15px 11px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
}
.footer svg { width: 11px; height: 11px; color: #a0aec0; }
.footer span { font-size: 11px; color: #a0aec0; }

.hidden { display: none; }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="header-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/>
        <path d="m21 21-4.35-4.35"/>
        <path d="M11 8v3l2 2"/>
      </svg>
    </div>
    <div>
      <div class="header-title">Review Authenticity Checker</div>
      <div class="header-sub">AI-powered detection</div>
    </div>
    <div class="version-badge">v1.0</div>
  </div>

  <div class="body">

    <div class="field-label">REVIEW TEXT</div>
    <textarea id="review" placeholder="Paste or type a product review to analyze…"></textarea>

    <button id="analyzeBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/>
        <path d="m21 21-4.35-4.35"/>
      </svg>
      Analyze Review
    </button>

    <div id="result" class="hidden">
      <div class="field-label" style="margin-bottom:9px;">ANALYSIS RESULT</div>
      <div class="score-row">
        <div class="score-box fake">
          <div class="score-label">FAKE SCORE</div>
          <div class="score-value"><span id="fakeScore">—</span>%</div>
          <div class="score-bar"><div class="score-fill" id="fakeBar" style="width:0%"></div></div>
        </div>
        <div class="score-box trust">
          <div class="score-label">TRUST SCORE</div>
          <div class="score-value"><span id="trustScore">—</span>%</div>
          <div class="score-bar"><div class="score-fill" id="trustBar" style="width:0%"></div></div>
        </div>
      </div>
      <hr class="divider">
      <p id="explanation"></p>
    </div>

  </div>

  <div class="footer">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
    </svg>
    <span>Analysis is private &amp; local</span>
  </div>

</div>
<script src="popup.js"></script>
</body>
</html>
